spring:
  application:
    name: store
  datasource:
    url: jdbc:mysql://localhost:3306/store_api?createDatabaseIfNotExist=true
    username: root
    password: 1234
  jpa:
    show-sql: true
  devtools:
    restart:
      enabled: true
jwt:
  secret: ${JWT_SECRET}
  accessTokenExpiration: 900 #5m
  refreshTokenExpiration: 604800 #7d
logging:
  level:
    org.springframework.boot.devtools: DEBUG