spring:
  application:
    name: store
  datasource:
    url: jdbc:mysql://localhost:3306/store_api?createDatabaseIfNotExist=true
    username: root
    password: 1234
  jpa:
    show-sql: true
  devtools:
    restart:
      enabled: true
jwt:
  secret: ${JWT_SECRET}
  accessTokenExpiration: 7200 #2h
  refreshTokenExpiration: 604800 #7d
logging:
  level:
    org.springframework.boot.devtools: DEBUG
stripe:
  secretKey: ${STRIPE_SECRET_KEY}
  webhookSecretKey: ${STRIPE_WEBHOOK_SECRET_KEY}

websiteUrl: http://localhost:4242

